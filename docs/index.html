#Findings
The present analysis examined how a participant produced ten trials of the voiceless alveolar fricative /s/ and ten trials of the voiceless postalveolar fricative /ʃ/. For each trial, measures of the center of gravity and skewness in Hertz were reported. A bivariate regression was conducted to investigate the relationship of plot skewness as a function of the phoneme [s] in predicting Center of Gravity (COG) as a function of the phoneme [s]. 

An inspection of a Residuals vs. Fitted Plot revealed that the assumption of linearity was not met. The assumption that the mean of the residuals was equal to 0 was met. There was homoscedasticity, as assessed by visual inspection of a scatter plot as well as Breusch-Pagan's Test (p &gt; .05). The assumption of no autocorrelation of residuals was not met, as assessed by a Durbin-Watson statistic of 1.3028 (p &lt; .05). The assumption that the predictor and residuals are not correlated was not met (p &lt; .05). Finally, as assessed by Shapiro-Wilk's test, residuals were normally distributed (p &gt; .05). Since an analysis of Cook's distance showed that trials 1 and 20 were not within the standard error of the other data points, these were removed. Following the removal of the outliers, the assumptions were met. 
---
#Findings
There was statistically significant correlation between plot skewness as a function of the phoneme [s] and COG as a function of the phoneme [s], r(18) = 0.98, p &lt; .001. The results of the bivariate regression revealed that the independent variable, plot skewness as a function of the phoneme [s], statistically significantly predicted the dependent variable, plot skewness as a function of the phoneme [s], F(1, 16) = 469.4, p &lt; .001.
